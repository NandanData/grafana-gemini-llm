services:
  grafana:
    image: grafana/grafana-oss
    container_name: grafana_dev
    restart: always
    ports:
      - "3000:3000"
    networks:
      - llm-net
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=dashgpt
      - GF_LIVE_ALLOWED_ORIGINS=*
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-llm-app
      - GF_PLUGIN_GRAFANA_LLM_APP_OPENAI_API_KEY=sk-Vi3bgOBX3CgNiPTqEb3nuA
      - GF_PLUGIN_GRAFANA_LLM_APP_OPENAI_URL=http://litellm_proxy:4000
      - GF_PLUGIN_GRAFANA_LLM_APP_OPENAI_MODEL=gemini-flash

  postgres:
    image: postgres:15
    container_name: litellm_db
    restart: always
    networks:
      - llm-net
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm123
      - POSTGRES_DB=litellm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm_proxy
    restart: always
    ports:
      - "4000:4000"
    networks:
      - llm-net
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://litellm:litellm123@litellm_db:5432/litellm
      - CORS_ALLOW_ORIGINS=*
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4000"

networks:
  llm-net:
    driver: bridge

volumes:
  grafana-storage:
  postgres-data:
