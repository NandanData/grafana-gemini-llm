model_list:
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "os.environ/GEMINI_API_KEY"
      max_tokens: 50
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash-001
      api_key: "os.environ/GEMINI_API_KEY"
      max_tokens: 50

general_settings:
  master_key: "sk-dummy-key-12345"
  disable_spend_logs: true
  disable_master_key_hash: true

litellm_settings:
  drop_params: true
  request_timeout: 30
  num_retries: 0
  allowed_fails: 1
  cooldown_time: 60
